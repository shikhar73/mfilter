version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install

  pre_build:
    commands:
      - echo Running tests...
      - npm test

  build:
    commands:
      - echo Build phase (nothing fancy here)
      - mkdir build
      - cp index.html build/

artifacts:
  files:
    - '**/*'
  base-directory: build